services:
  kitty:
    build: .
    container_name: kitty-trader
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./feedback:/app/feedback
      - ./token_usage:/app/token_usage
      - ./commands:/app/commands
      - ./reports:/app/reports
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/host/kitty
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  kitty-night:
    build:
      context: .
      dockerfile: Dockerfile.night
    container_name: kitty-night-trader
    restart: unless-stopped
    env_file:
      - .env.night
    volumes:
      - ./night-logs:/app/night-logs
      - ./night-feedback:/app/night-feedback
      - ./night-token_usage:/app/night-token_usage
      - ./night-reports:/app/night-reports
      - ./night-commands:/app/night-commands
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  monitor:
    build: ./monitor
    container_name: kitty-monitor
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/logs:ro               # kitty 로그 읽기 전용
      - ./feedback:/feedback:ro       # 에이전트 피드백 읽기 전용
      - ./token_usage:/token_usage:ro # 토큰 사용량 읽기 전용
      - ./commands:/commands          # 모드 전환 등 kitty 명령 채널
      - ./monitor-data:/data          # SQLite DB 영속 저장
      - ./night-logs:/night-logs:ro               # night 로그 읽기 전용
      - ./night-feedback:/night-feedback:ro       # night 피드백 읽기 전용
      - ./night-token_usage:/night-token_usage:ro # night 토큰 사용량 읽기 전용
      - ./reports:/reports:ro                     # 국내 매매 리포트 읽기 전용
      - ./night-reports:/night-reports:ro         # 해외 매매 리포트 읽기 전용
    environment:
      - MONITOR_PASSWORD=${MONITOR_PASSWORD:-kitty}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
